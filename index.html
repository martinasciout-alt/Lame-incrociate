  <!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lama Alta</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- POPUP -->
<div id="rulesPopup">
  <div id="rulesBox">
    <button id="closeRules" onclick="closeRules()">X</button>
    <h2>Regole</h2>
    <p>CPU prima, poi giocatori</p>
    <p>3 secondi per scegliere</p>
    <p>3 round totali</p>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby">
  <div id="leaderboard"></div>

  <div id="lobbyCenter">
    <h1>Lama Alta</h1>
    <button onclick="createRoom(prompt('stanza'))">Crea stanza</button>
    <button onclick="joinRoom(prompt('stanza'))">Entra stanza</button>
    <button onclick="enterGame()">Gioca</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">

  <h1>Lama Alta</h1>

  <p>Stanza: <span id="roomCode"></span></p>
  <p>Round: <span id="round"></span></p>

  <p>P1: <span id="score1"></span> | P2: <span id="score2"></span></p>

  <div id="countdown"></div>

  <div id="table">
    <div id="cardP1"></div>
    <div id="cardCPU"></div>
    <div id="cardP2"></div>
  </div>

  <div id="hand"></div>

  <div id="result"></div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
