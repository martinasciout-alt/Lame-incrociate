 <!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gioco Della Lama Alta</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- START SCREEN -->
  <div id="startScreen" class="start-screen">
    <div class="rules-box">
      <h2>Regole del gioco</h2>

      <ul>
        <li>Devi creare o entrare in una stanza</li>
        <li>Ogni giocatore sceglie una carta da 1 a 5</li>
        <li>Chi si avvicina al valore del computer vince</li>
        <li>Stessa carta del CPU = perdita automatica</li>
        <li>Best of 3 round</li>
      </ul>

      <button onclick="enterGame()">ENTRA NEL GIOCO</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none">

    <h1>Gioco della Lama Alta</h1>

    <p>Stanza: <span id="roomCode">---</span></p>
    <p>Round: <span id="round">1</span></p>

    <p>
      P1: <span id="score1">0</span> |
      P2: <span id="score2">0</span>
    </p>

    <div id="countdown"></div>

    <div id="table">
      <div id="cardP1"></div>
      <div id="cardP2"></div>
      <div id="cardCPU"></div>
    </div>

    <div id="hand"></div>

    <button onclick="createRoom(prompt('Codice stanza'))">Crea stanza</button>
    <button onclick="joinRoom(prompt('Codice stanza'))">Entra stanza</button>

    <div id="overlay" class="hidden">
      <h1 id="finalText"></h1>
    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
