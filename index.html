<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lama Alta</title>

   <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">

  <link rel="stylesheet" href="style.css">
</head>

  

<body>

<!-- LOBBY -->
<div id="lobby">

  <div class="lobby-box">

    <h1>Lama Alta</h1>

    <input id="roomInput" placeholder="Nome stanza">

    <input id="nickInput" placeholder="Nickname">

    <select id="colorInput">
      <option value="red">Rosso</option>
      <option value="blue">Blu</option>
      <option value="green">Verde</option>
      <option value="gold">Oro</option>
      <option value="purple">Viola</option>
    </select>

    <button onclick="createRoom()">Crea stanza</button>

    <button onclick="joinRoom()">Entra stanza</button>

    <h3>🏆 Classifica globale</h3>

    <div id="leaderboard"></div>

  </div>

</div>

<!-- GAME -->
<div id="game" class="hidden">

  <h2 id="playerLabel"></h2>

  <p>Stanza: <span id="roomCode"></span></p>
  <p>Round: <span id="round"></span></p>

  <p>Score: <span id="score1"></span> - <span id="score2"></span></p>

  <div id="countdown"></div>

  <div id="table">
    <div id="cardP1"></div>
    <div id="cardCPU"></div>
    <div id="cardP2"></div>
  </div>

  <div id="hand"></div>

  <div id="result"></div>

</div>

  <!-- REGOLE -->
<div id="rulesModal">
  <div class="rules-box">
    <span id="closeRules">✖</span>

    <h2>Regole del gioco</h2>

    <p>
      Ogni giocatore sceglie una carta da 1 a 5.<br>
      Il gioco genera una carta CPU casuale.<br><br>

      Vince chi ha la carta più vicina alla CPU.<br>
      In caso di pareggio: pareggio.<br><br>

      Dopo ogni round si aggiorna il punteggio.
    </p>
  </div>
</div>

<!-- bottone riapri regole -->
<button id="openRules">?</button>

<script type="module" src="script.js"></script>
</body>
</html>
