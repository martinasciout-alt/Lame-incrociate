<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lame Incrociate</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

  <h1>Lame Incrociate</h1>

  <div id="status">
    <button onclick="startMusic()">🔊 Musica</button>

    <p>Stanza: <span id="roomCode">---</span></p>
    <p>Turno: <span id="round">1</span></p>

    <p>
      P1: <span id="score1">0</span> |
      P2: <span id="score2">0</span>
    </p>

    <input id="roomInput" placeholder="CODICE STANZA">
    <button onclick="createRoom(document.getElementById('roomInput').value)">Crea</button>
    <button onclick="joinRoom(document.getElementById('roomInput').value)">Entra</button>
  </div>

  <div id="table">
    <div>
      <h3>Player 1</h3>
      <div id="cardP1"></div>
    </div>

    <div>
      <h3>Player 2</h3>
      <div id="cardP2"></div>
    </div>
  </div>

  <div class="cards">

    <button onclick="choose(1,1)"><img src="carta-1.webp"></button>
    <button onclick="choose(1,2)"><img src="carta-2.webp"></button>
    <button onclick="choose(1,3)"><img src="carta-3.webp"></button>
    <button onclick="choose(1,4)"><img src="carta-4.webp"></button>
    <button onclick="choose(1,5)"><img src="carta-5.webp"></button>

  </div>

  <div id="result"></div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
