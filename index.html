<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gioco Della Lama Alta</title>

  <link href="https://fonts.cdnfonts.com/css/pieces-of-eight" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- OVERLAY FINE PARTITA -->
  <div id="overlay" class="hidden">
    <div class="overlay-content">
      <h1 id="finalText"></h1>
      <button onclick="restartGame()">Rigioca</button>
    </div>
  </div>

  <div id="game">

    <h1>Il Gioco della Lama Alta</h1>

    <!-- STATUS -->
    <div id="status">
      <p>Stanza: <span id="roomCode">---</span></p>
      <p>Turno: <span id="round">1</span> / 3</p>

      <p>
        Punteggio →
        Player 1: <span id="score1">0</span> |
        Player 2: <span id="score2">0</span>
      </p>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown">In attesa...</div>

    <!-- TAVOLO -->
    <div id="table">
      <div class="card-slot">
        <p>Player 1</p>
        <div id="cardP1"></div>
      </div>

      <div class="card-slot">
        <p>Player 2</p>
        <div id="cardP2"></div>
      </div>
    </div>

    <!-- RISULTATO -->
    <div id="result"></div>

    <!-- MANO PLAYER (DINAMICA) -->
    <div class="players">

      <div class="player">
        <h2>La tua mano</h2>

        <div class="cards" id="hand"></div>

      </div>

    </div>

    <!-- BOTTONI STANZA -->
    <button onclick="createRoom(prompt('Codice stanza:'))">Crea stanza</button>
<button onclick="joinRoom(prompt('Codice stanza:'))">Entra stanza</button>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
