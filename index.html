<!DOCTYPE html>
<html lang="it">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gioco Carte 1-5</title>

  <!-- FONT -->
  <link href="https://fonts.cdnfonts.com/css/pieces-of-eight" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div id="game">

    <h1>Il Gioco della Lama Alta</h1>

    <!-- STATO PARTITA -->
    <div id="status">
      <p>Stanza: <span id="roomCode">---</span></p>
      <p>Turno: <span id="round">1</span> / 3</p>
      <p>Punteggio → Player 1: <span id="score1">0</span> | Player 2: <span id="score2">0</span></p>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown">Pronto</div>

    <!-- TAVOLO -->
    <div id="table">
      <div class="card-slot">
        <p>Player 1</p>
        <div id="cardP1"></div>
      </div>

      <div class="card-slot">
        <p>Player 2</p>
        <div id="cardP2"></div>
      </div>
    </div>

    <!-- CARTE SCELTA -->
    <div class="players">

      <!-- PLAYER 1 -->
      <div class="player" id="p1">
      <h2 class="p1">Player 1</h2>
        <div class="cards">
          <button onclick="choose(1,1)"><img src="carta-1.webp" alt="1"></button>
          <button onclick="choose(1,2)"><img src="carta-2.webp" alt="2"></button>
          <button onclick="choose(1,3)"><img src="carta-3.webp" alt="3"></button>
          <button onclick="choose(1,4)"><img src="carta-4.webp" alt="4"></button>
          <button onclick="choose(1,5)"><img src="carta-5.webp" alt="5"></button>
        </div>
        <p>Scelta: <span id="choice1">-</span></p>
      </div>

      <!-- PLAYER 2 -->
      <div class="player" id="p2">
        <h2 class="p2">Player 2</h2>
        <div class="cards">
          <button onclick="choose(2,1)"><img src="carta-1.webp" alt="1"></button>
          <button onclick="choose(2,2)"><img src="carta-2.webp" alt="2"></button>
          <button onclick="choose(2,3)"><img src="carta-3.webp" alt="3"></button>
          <button onclick="choose(2,4)"><img src="carta-4.webp" alt="4"></button>
          <button onclick="choose(2,5)"><img src="carta-5.webp" alt="5"></button>
        </div>
        <p>Scelta: <span id="choice2">-</span></p>
      </div>

    </div>

    <!-- RISULTATO -->
    <div id="result"></div>

    <button onclick="nextRound()">Prossimo turno</button>

  </div>

  <script src="script.js"></script>

</body>
</html>
