<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lama Alta</title>

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lama Alta</title>

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
  
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="lobby">
  <div class="lobby-box">
    <h1>Lama Alta</h1>

    <input id="roomInput" placeholder="Nome stanza">
    <input id="nickInput" placeholder="Nickname">

    <select id="colorInput">
      <option value="#ff4d4d">Rosso</option>
      <option value="#4da6ff">Blu</option>
      <option value="#4dff88">Verde</option>
      <option value="#ffd24d">Oro</option>
      <option value="#b84dff">Viola</option>
    </select>

    <button onclick="createRoom()">Crea stanza</button>
    <button onclick="joinRoom()">Entra stanza</button>

    <h3>🏆 Classifica globale</h3>
    <div id="leaderboard">Caricamento classifica...</div>
  </div>
</div>

<div id="game" class="hidden">

  <h2 id="playerLabel"></h2>

  <p>Stanza: <span id="roomCode"></span></p>
  <p>Round: <span id="round"></span> / 5</p>

  <p>Score: <span id="score1"></span> || <span id="score2"></span></p>

  <div id="countdown"></div>

  <div id="table">
    <div id="cardP1"></div>
    <div id="cardCPU"></div>
    <div id="cardP2"></div>
  </div>

  <div id="hand"></div>

  <div id="result"></div>

</div>

<div id="popupRegole" class="hidden">
  <div class="popup-box">
    <button id="chiudiPopup">&times;</button>
    <img src="Rr.png" alt="Regolamento">
  </div>
</div>

<button id="helpButton">?</button>

<script type="module" src="script.js"></script>

<div id="popupPunto" class="popup hidden">
  <div class="popup-content">
    <span id="chiudiPopupPunto" class="close-btn">&times;</span>
    <img src="punto.webp" alt="Punto!" class="popup-img">
  </div>
</div>

<div id="popupMadamaVince" class="popup hidden">
  <div class="popup-content">
    <span id="chiudiPopupMadamaVince" class="close-btn">&times;</span>
    <img src="madama vince.webp" alt="Madama Vince" class="popup-img">
  </div>
</div>

<div id="popupMadamaPerde" class="popup hidden">
  <div class="popup-content">
    <span id="chiudiPopupMadamaPerde" class="close-btn">&times;</span>
    <img src="madama perde.webp" alt="Madama Perde" class="popup-img">
  </div>
</div>

  <div id="popupNessunPunto" class="popup hidden">
  <div class="popup-content">
    <span id="chiudiPopupNessunPunto" class="close-btn">&times;</span>
    <img src="nessun punto.webp" alt="Nessun punto per te" class="popup-img">
  </div>
</div>
  
</body>
</html>
