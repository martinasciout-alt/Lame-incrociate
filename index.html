 <!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lama Alta</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="start-screen">
  <button onclick="enterGame()">ENTRA</button>
</div>

<div id="game" class="hidden">

  <h1>Lama Alta</h1>

  <p>Stanza: <span id="roomCode"></span></p>
  <p>Round: <span id="round"></span></p>

  <p>P1: <span id="score1"></span> | P2: <span id="score2"></span></p>

  <div id="countdown"></div>

  <div id="table">
    <div id="cardP1"></div>
    <div id="cardCPU"></div>
    <div id="cardP2"></div>
  </div>

  <div id="hand"></div>

  <div id="result"></div>

  <button onclick="createRoom(prompt('stanza'))">Crea</button>
  <button onclick="joinRoom(prompt('stanza'))">Entra</button>

  <button onclick="nextRound()">Nuovo</button>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
