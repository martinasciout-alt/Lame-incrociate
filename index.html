<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gioco Carte 1-5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">

    <h1>Gioco Carte 1-5</h1>

    <!-- STATO PARTITA -->
    <div id="status">
      <p>Stanza: <span id="roomCode">---</span></p>
      <p>Turno: <span id="round">1</span> / 3</p>
      <p>Punteggio → Player 1: <span id="score1">0</span> | Player 2: <span id="score2">0</span></p>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown">Pronto</div>

    <!-- TAVOLO -->
    <div id="table">
      <div class="card-slot">
        <p>Player 1</p>
        <div id="cardP1"></div>
      </div>

      <div class="card-slot">
        <p>Player 2</p>
        <div id="cardP2"></div>
      </div>
    </div>

    <!-- AREA CARTE -->
    <div class="players">

      <div class="player" id="p1">
        <h2>Player 1</h2>
        <div class="cards">
          <button onclick="choose(1,1)">1</button>
          <button onclick="choose(1,2)">2</button>
          <button onclick="choose(1,3)">3</button>
          <button onclick="choose(1,4)">4</button>
          <button onclick="choose(1,5)">5</button>
        </div>
        <p>Scelta: <span id="choice1">-</span></p>
      </div>

      <div class="player" id="p2">
        <h2>Player 2</h2>
        <div class="cards">
          <button onclick="choose(2,1)">1</button>
          <button onclick="choose(2,2)">2</button>
          <button onclick="choose(2,3)">3</button>
          <button onclick="choose(2,4)">4</button>
          <button onclick="choose(2,5)">5</button>
        </div>
        <p>Scelta: <span id="choice2">-</span></p>
      </div>

    </div>

    <!-- RISULTATO -->
    <div id="result"></div>

    <button onclick="nextRound()">Prossimo turno</button>

  </div>

  <script src="script.js"></script>

</body>
</html>
</html>
