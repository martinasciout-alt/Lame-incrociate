<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gioco Della Lama Alta</title>

  <link href="https://fonts.cdnfonts.com/css/pieces-of-eight" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="overlay" class="hidden">
    <div class="overlay-content">
      <h1 id="finalText"></h1>
      <button onclick="restartGame()">Rigioca</button>
    </div>
  </div>

  <div id="game">

    <h1>Il Gioco della Lama Alta</h1>

    <!-- STATUS -->
    <div id="status">
      <p>Stanza: <span id="roomCode">---</span></p>
      <p>Turno: <span id="round">1</span> / 3</p>

      <p>
        Punteggio →
        Player 1: <span id="score1">0</span> |
        Player 2: <span id="score2">0</span>
      </p>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown">In attesa...</div>

    <!-- TAVOLO -->
    <div id="table">
      <div class="card-slot">
        <p>Player 1</p>
        <div id="cardP1"></div>
      </div>

      <div class="card-slot">
        <p>Player 2</p>
        <div id="cardP2"></div>
      </div>
    </div>

    <!-- CARTE PLAYER -->
    <div class="players">

      <div class="player">
        <h2>Player</h2>

        <div class="cards">
          <button onclick="choose(1,1)"><img src="carta-1.webp"></button>
          <button onclick="choose(1,2)"><img src="carta-2.webp"></button>
          <button onclick="choose(1,3)"><img src="carta-3.webp"></button>
          <button onclick="choose(1,4)"><img src="carta-4.webp"></button>
          <button onclick="choose(1,5)"><img src="carta-5.webp"></button>
        </div>

      </div>

    </div>

    <div id="result"></div>

    <button onclick="createRoomPrompt()">Crea stanza</button>
    <button onclick="joinRoomPrompt()">Entra stanza</button>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
